name: Pi Search Runner

on:
  schedule:
    - cron: '0 */6 * * *' # Runs every 6 hours
  workflow_dispatch: # Allows you to trigger it manually from the Actions tab

jobs:
  run-search:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Crucial: Allows the bot to commit back to the repo
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run PowerShell Script
        shell: pwsh
        run: ./script.ps1

      - name: Commit and Push Progress
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add progress.txt
          git commit -m "Save progress from automated run" || echo "No changes to commit"
          git push
